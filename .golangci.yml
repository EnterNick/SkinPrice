# .golangci.yml
version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: true

output:
  formats:
    format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused

    - errorlint
    - nilerr
    - nilnil
    - noctx
    - unconvert
    - unparam
    - prealloc
    - durationcheck
    - makezero

    - misspell
    - whitespace
    - asciicheck
    - bidichk
    - usestdlibvars

    - thelper
    - usetesting
    - tparallel


linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment

  revive:
    severity: warning
    ignore-generated-header: true
    rules:
      - name: blank-imports
      - name: context-keys-type
      - name: empty-lines
      - name: errorf
      - name: error-naming
      - name: exported
        disabled: true
      - name: increment-decrement
      - name: receiver-naming
      - name: var-naming
      - name: range
      - name: unnecessary-stmt

issues:
  exclude-dirs-use-default: true
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-dirs:
    - vendor
    - third_party

  exclude-files:
    - ".*_gen\\.go"
    - ".*\\.pb\\.go"
    - "wire_gen\\.go"
    - "mock_.*\\.go"

  exclude-rules:
    - path: _test\.go
      linters:
        - noctx
        - bodyclose
