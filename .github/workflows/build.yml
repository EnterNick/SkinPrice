name: Build

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  GO_VERSION_FILE: go.mod
  WAILS_VERSION: v2.12.0

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: skinprice/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: skinprice/frontend
        run: npm ci

      - name: Run Go tests
        run: go test ./...

      - name: Run frontend typecheck
        working-directory: skinprice/frontend
        run: npm run lint

      - name: Build frontend
        working-directory: skinprice/frontend
        run: npm run build

  desktop-build:
    name: Desktop build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: checks
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact_name: skinprice-linux
            build_flags: -platform linux/amd64 -tags webkit2_41
            archive_name: SkinPrice-linux-amd64.tar.gz
          - os: windows-2022
            artifact_name: skinprice-windows
            build_flags: -platform windows/amd64
            archive_name: SkinPrice-windows-amd64.zip
          - os: macos-14
            artifact_name: skinprice-macos
            build_flags: -platform darwin/universal
            archive_name: SkinPrice-macos-universal.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: skinprice/frontend/package-lock.json

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        working-directory: skinprice/frontend
        run: npm ci

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build desktop application
        if: runner.os != 'Windowns'
        working-directory: skinprice
        shell: bash
        run: wails build -clean ${{ matrix.build_flags }}

      - name: Build windows desktop application
        if: runner.os == 'Windowns'
        working-directory: skinprice
        shell: bash
        run: CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++ wails build -platform windows/amd64

      - name: Package Linux build
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist
          tar -C skinprice/build/bin -czf "dist/${{ matrix.archive_name }}" .

      - name: Package macOS build
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent skinprice/build/bin "dist/${{ matrix.archive_name }}"

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "skinprice/build/bin/*" -DestinationPath "dist/${{ matrix.archive_name }}" -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-24.04
    needs: desktop-build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
