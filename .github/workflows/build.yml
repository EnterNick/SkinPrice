name: Build

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  GO_VERSION_FILE: go.mod
  WAILS_VERSION: v2.12.0

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: skinprice/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: skinprice/frontend
        run: npm ci

      - name: Run Go tests
        run: go test ./...

      - name: Run frontend lint
        working-directory: skinprice/frontend
        run: npm run lint

      - name: Build frontend
        working-directory: skinprice/frontend
        run: npm run build

  linux-build:
    name: Build Linux binaries
    runs-on: ubuntu-24.04
    needs: checks
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: skinprice/frontend/package-lock.json

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        working-directory: skinprice/frontend
        run: npm ci

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Linux app
        working-directory: skinprice
        shell: bash
        run: wails build -clean -platform linux/amd64 -tags webkit2_41

      - name: Build Linux launcher
        shell: bash
        run: |
          mkdir -p dist/linux
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o dist/linux/launcher ./skinprice/cmd/launcher
          cp skinprice/build/bin/SkinPrice dist/linux/skinprice
          chmod +x dist/linux/launcher dist/linux/skinprice

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: dist/linux/*
          if-no-files-found: error

  windows-build:
    name: Build Windows binaries
    runs-on: ubuntu-24.04
    needs: checks
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: skinprice/frontend/package-lock.json

      - name: Install Windows cross-build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 zip

      - name: Install frontend dependencies
        working-directory: skinprice/frontend
        run: npm ci

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Windows app
        working-directory: skinprice
        shell: bash
        run: |
          CGO_ENABLED=1 \
          GOOS=windows \
          GOARCH=amd64 \
          CC=x86_64-w64-mingw32-gcc \
          CXX=x86_64-w64-mingw32-g++ \
          wails build -clean -platform windows/amd64

      - name: Build Windows launcher
        shell: bash
        run: |
          mkdir -p dist/windows
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o dist/windows/launcher.exe ./skinprice/cmd/launcher
          cp skinprice/build/bin/SkinPrice.exe dist/windows/SkinPrice.exe

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: dist/windows/*
          if-no-files-found: error

  release:
    name: Package release assets
    runs-on: ubuntu-24.04
    needs:
      - linux-build
      - windows-build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: release/linux

      - name: Download Windows binaries
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: release/windows

      - name: Package release assets
        shell: bash
        run: make -C "$GITHUB_WORKSPACE" release-package-assets RELEASE_VERSION="${GITHUB_REF_NAME#v}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/assets/skinprice-bootstrap-windows-amd64.zip
            release/assets/skinprice-windows-amd64.zip
            release/assets/skinprice-bootstrap-linux-amd64.tar.gz
            release/assets/skinprice-linux-amd64.tar.gz
            release/assets/update-manifest.json
